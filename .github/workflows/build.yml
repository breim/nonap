name: Build NoNap

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app
        run: |
          xcodebuild \
            -project NoNap.xcodeproj \
            -scheme NoNap \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package DMG
        run: |
          mkdir -p dmg
          cp -R build/Build/Products/Release/NoNap.app dmg/
          ln -s /Applications dmg/Applications
          cp NoNap/NoNap.icns dmg/.VolumeIcon.icns
          xcrun SetFile -a C dmg
          hdiutil create \
            -volname NoNap \
            -srcfolder dmg \
            -ov \
            -format UDZO \
            NoNap-macOS.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoNap-macOS
          path: NoNap-macOS.dmg

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NoNap-macOS.dmg
